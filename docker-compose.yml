# Honcho Docker Compose
#
# Usage:
#   cp docker-compose.yml.example docker-compose.yml
#   cp .env.template .env  # edit with your provider config
#   docker compose up -d --build
#
# By default, ports are bound to 127.0.0.1 (localhost only).
# For development, uncomment the source mounts and monitoring services below.

services:
  api:
    image: ghcr.io/lesterholy/honcho:latest
    container_name: honcho-api
    entrypoint: ["sh", "/app/docker/entrypoint.sh"]
    ports:
      - ${HOST_PORT}:8000
    environment:
      - POSTGRES_DB=${POSTGRES_DB}
      - PRIVATE_HOST=${PRIVATE_HOST}
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - DB_CONNECTION_URI=postgresql+psycopg://${POSTGRES_USER}:${POSTGRES_PASSWORD}@${PRIVATE_HOST}:15432/${POSTGRES_DB}
      - CACHE_URL=redis://${PRIVATE_HOST}:16379/0?suppress=true
      - CACHE_ENABLED=true
    env_file:
      - path: .env
        required: false
    restart: unless-stopped

  deriver:
    image: ghcr.io/lesterholy/honcho:latest
    container_name: honcho-deriver
    entrypoint: ["/app/.venv/bin/python", "-m", "src.deriver"]
    environment:
      - POSTGRES_DB=${POSTGRES_DB}
      - PRIVATE_HOST=${PRIVATE_HOST}
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - DB_CONNECTION_URI=postgresql+psycopg://${POSTGRES_USER}:${POSTGRES_PASSWORD}@${PRIVATE_HOST}:15432/${POSTGRES_DB}
      - CACHE_URL=redis://${PRIVATE_HOST}:16379/0?suppress=true
      - CACHE_ENABLED=true
    env_file:
      - path: .env
        required: false
    restart: unless-stopped

networks:
  default:
    external: true
    name: dokploy-network
  traefik:
    external: true
    name: traefik-network
